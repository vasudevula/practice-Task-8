<!DOCTYPE html>
<html>
<head>
<title>Task 8 — Loader & Error Handling</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f4f6f9;
  padding:20px;
}

#loader{
  font-size:22px;
  margin:30px;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:150px;
  object-fit:contain;
}
</style>
</head>

<body>

<h1>🛒 Products (Task 8)</h1>

<div id="loader">⏳ Loading products...</div>

<div id="products" class="container"></div>

<script>

const loader = document.getElementById("loader");
const productsDiv = document.getElementById("products");

// 🌐 Fetch products
fetch("https://fakestoreapi.com/products")

  .then(response => response.json())

  .then(data => {

    // ⏳ Hide loader
    loader.style.display = "none";

    // 📦 Show products
    data.forEach(product => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${product.image}">
        <p>${product.title.substring(0,40)}...</p>
        <p><b>₹ ${product.price}</b></p>
      `;

      productsDiv.appendChild(card);
    });

  })

  .catch(error => {

    // ❌ Error message
    loader.textContent =
      "❌ Failed to load products. Check internet.";

    console.error(error);
  });

</script>

</body>
</html>
