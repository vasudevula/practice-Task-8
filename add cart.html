<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Dashboard</title>

<style>
  body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
  }

  h1 { text-align: center; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cart {
    font-size: 18px;
    font-weight: bold;
  }

  .controls {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    margin: 20px 0;
  }

  input, select, button {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    cursor: pointer;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.2s;
  }

  .card:hover { transform: translateY(-5px); }

  img {
    width: 100%;
    height: 180px;
    object-fit: contain;
  }

  .title { font-weight: bold; margin: 8px 0; }
  .price { color: green; font-weight: bold; }
  .category { font-size: 13px; color: #555; }
  .rating { color: orange; font-size: 13px; }

  .add-btn {
    margin-top: 10px;
    background: #4caf50;
    color: white;
    border: none;
  }

  .add-btn:hover { background: #388e3c; }
</style>
</head>

<body>

<div class="top-bar">
  <h1>🛒 Product Dashboard</h1>
  <div class="cart">🛍️ Cart: <span id="cartCount">0</span></div>
</div>

<div class="controls">

  🔍
  <input type="text" id="searchInput" placeholder="Search...">

  📂
  <select id="categoryFilter">
    <option value="all">All Categories</option>
    <option value="men's clothing">Men's Clothing</option>
    <option value="women's clothing">Women's Clothing</option>
    <option value="electronics">Electronics</option>
    <option value="jewelery">Jewelry</option>
  </select>

  💰
  <button id="lowHigh">Price Low → High</button>
  <button id="highLow">Price High → Low</button>

</div>

<div class="container" id="productContainer"></div>

<script>
const container = document.getElementById("productContainer");
const searchInput = document.getElementById("searchInput");
const categoryFilter = document.getElementById("categoryFilter");
const lowHighBtn = document.getElementById("lowHigh");
const highLowBtn = document.getElementById("highLow");
const cartCount = document.getElementById("cartCount");

let allProducts = [];
let currentProducts = [];
let cart = [];

// Fetch products
fetch("https://fakestoreapi.com/products")
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    currentProducts = data;
    displayProducts(data);
  });

// Display products
function displayProducts(products) {
  container.innerHTML = "";

  products.forEach(product => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${product.image}">
      <div class="title">${product.title.substring(0,50)}...</div>
      <div class="price">₹ ${product.price}</div>
      <div class="category">${product.category}</div>
      <div class="rating">⭐ ${product.rating.rate}</div>
      <button class="add-btn">Add to Cart 🛒</button>
    `;

    // 🛒 Add to Cart logic
    card.querySelector(".add-btn").addEventListener("click", () => {
      cart.push(product);
      cartCount.textContent = cart.length;
    });

    container.appendChild(card);
  });
}

// Filters
function applyFilters() {

  const searchValue = searchInput.value.toLowerCase();
  const categoryValue = categoryFilter.value;

  currentProducts = allProducts.filter(p => {

    const matchesSearch =
      p.title.toLowerCase().includes(searchValue) ||
      p.category.toLowerCase().includes(searchValue);

    const matchesCategory =
      categoryValue === "all" ||
      p.category === categoryValue;

    return matchesSearch && matchesCategory;
  });

  displayProducts(currentProducts);
}

// Sorting
lowHighBtn.addEventListener("click", () => {
  const sorted = [...currentProducts].sort((a,b) => a.price - b.price);
  displayProducts(sorted);
});

highLowBtn.addEventListener("click", () => {
  const sorted = [...currentProducts].sort((a,b) => b.price - a.price);
  displayProducts(sorted);
});

// Events
searchInput.addEventListener("input", applyFilters);
categoryFilter.addEventListener("change", applyFilters);

</script>

</body>
</html>
