<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Dashboard</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f6f9;
}

h1{
  text-align:center;
  padding:15px;
}

/* Layout */
.main{
  display:flex;
  gap:20px;
  padding:20px;
}

/* Products */
.products{ flex:3; }

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

input,select,button{
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.card img{
  width:100%;
  height:160px;
  object-fit:contain;
}

.price{ color:green; font-weight:bold; }

button{ cursor:pointer; }

/* Cart */
.cart{
  flex:1;
  background:white;
  padding:15px;
  border-radius:10px;
  height:fit-content;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border-bottom:1px solid #ddd;
  padding:6px;
  text-align:center;
}

.total{
  font-weight:bold;
  margin-top:10px;
}

/* Loader */
#loader{
  text-align:center;
  font-size:18px;
  margin:20px 0;
}

/* Responsive */
@media(max-width:768px){
  .main{ flex-direction:column; }
  .cart{ order:-1; }
}
</style>
</head>

<body>

<h1>🛒 Product Dashboard</h1>

<div class="main">

  <!-- PRODUCTS -->
  <div class="products">

    <div class="controls">
      <input id="search" placeholder="Search...">

      <select id="category">
        <option value="all">All</option>
        <option value="men's clothing">Men</option>
        <option value="women's clothing">Women</option>
        <option value="electronics">Electronics</option>
        <option value="jewelery">Jewelry</option>
      </select>

      <button id="low">Price ↑</button>
      <button id="high">Price ↓</button>
    </div>

    <div id="loader">⏳ Loading products...</div>

    <div class="container" id="productContainer"></div>

  </div>

  <!-- CART -->
  <div class="cart">
    <h3>🛒 Cart (<span id="count">0</span>)</h3>

    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="cartItems"></tbody>
      </table>
    </div>

    <div class="total">Total: ₹ <span id="total">0</span></div>
  </div>

</div>

<script>

const container = document.getElementById("productContainer");
const loader = document.getElementById("loader");

const search = document.getElementById("search");
const category = document.getElementById("category");

const cartItems = document.getElementById("cartItems");
const count = document.getElementById("count");
const totalEl = document.getElementById("total");

let allProducts = [];
let currentProducts = [];
let cart = [];

/* 🔹 Fetch Products */
fetch("https://fakestoreapi.com/products")
.then(res => res.json())
.then(data => {
  loader.style.display = "none";   // ⭐ hide loader
  allProducts = data;
  currentProducts = data;
  displayProducts(data);
});

/* 🔹 Display Products */
function displayProducts(products){
  container.innerHTML = "";

  products.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.image}">
      <p>${p.title.substring(0,40)}...</p>
      <p class="price">₹ ${p.price}</p>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
    `;

    container.appendChild(card);
  });
}

/* 🔹 Search + Filter */
function applyFilters(){
  const s = search.value.toLowerCase();
  const c = category.value;

  currentProducts = allProducts.filter(p => {
    const matchSearch =
      p.title.toLowerCase().includes(s) ||
      p.category.toLowerCase().includes(s);

    const matchCat =
      c === "all" || p.category === c;

    return matchSearch && matchCat;
  });

  displayProducts(currentProducts);
}

search.addEventListener("input", applyFilters);
category.addEventListener("change", applyFilters);

/* 🔹 Sorting */
document.getElementById("low").onclick = () =>
  displayProducts([...currentProducts].sort((a,b)=>a.price-b.price));

document.getElementById("high").onclick = () =>
  displayProducts([...currentProducts].sort((a,b)=>b.price-a.price));

/* 🔹 Add to Cart */
function addToCart(id){
  const product = allProducts.find(p => p.id === id);
  const item = cart.find(i => i.id === id);

  if(item) item.qty++;
  else cart.push({...product, qty:1});

  updateCart();
}

/* 🔹 Update Cart */
function updateCart(){

  cartItems.innerHTML = "";

  let total = 0;

  cart.forEach(item => {

    total += item.price * item.qty;

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.title.substring(0,12)}</td>
      <td>${item.price}</td>
      <td>${item.qty}</td>
      <td>
        <button onclick="removeItem(${item.id})">❌</button>
      </td>
    `;

    cartItems.appendChild(row);
  });

  count.textContent = cart.length;
  totalEl.textContent = total.toFixed(2);
}

/* 🔹 Remove Item */
function removeItem(id){
  cart = cart.filter(i => i.id !== id);
  updateCart();
}

</script>

</body>
</html>
