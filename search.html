<!DOCTYPE html>
<html>
<head>
  <title>Search Products Example</title>
  <style>
    body{ font-family: Arial; padding:20px; background:#f4f6f9; }
    #search{ padding:8px; width:300px; margin-bottom:20px; border-radius:6px; border:1px solid #ccc; }
    .container{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; }
    .card{ background:white; padding:15px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1); text-align:center; }
    .card img{ width:100%; height:150px; object-fit:contain; }
    .price{ color:green; font-weight:bold; }
  </style>
</head>
<body>

<h2>🔍 Search Products</h2>
<input id="search" placeholder="Type to search by Title or Category...">

<div class="container" id="productContainer"></div>

<script>
const search = document.getElementById("search");
const container = document.getElementById("productContainer");

let allProducts = [];

// 🌐 Fetch products
fetch("https://fakestoreapi.com/products")
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    displayProducts(allProducts);
  })
  .catch(err => {
    container.innerHTML = "❌ Failed to load products.";
    console.error(err);
  });

// Display products
function displayProducts(products){
  container.innerHTML = "";
  products.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${p.image}">
      <p>${p.title.substring(0,50)}</p>
      <p class="price">₹ ${p.price}</p>
      <p><i>${p.category}</i></p>
    `;
    container.appendChild(card);
  });
}

// Real-time filtering
search.addEventListener("input", () => {
  const term = search.value.toLowerCase();
  const filtered = allProducts.filter(p => 
    p.title.toLowerCase().includes(term) ||
    p.category.toLowerCase().includes(term)
  );
  displayProducts(filtered);
});
</script>

</body>
</html>
